global:
  scrape_interval: 5s

scrape_configs:
  - job_name: api-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-service:8080"]

  - job_name: worker-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["worker-service:8081"]
